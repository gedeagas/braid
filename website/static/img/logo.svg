<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Apple-accurate squircle: continuous superellipse, no straight sides -->
    <clipPath id="sq">
      <path d="
        M 512 0
        C 679.6 0 776.4 0 848.8 35.6
        C 921.2 71.2 952.8 102.8 988.4 175.2
        C 1024 247.6 1024 344.4 1024 512
        C 1024 679.6 1024 776.4 988.4 848.8
        C 952.8 921.2 921.2 952.8 848.8 988.4
        C 776.4 1024 679.6 1024 512 1024
        C 344.4 1024 247.6 1024 175.2 988.4
        C 102.8 952.8 71.2 921.2 35.6 848.8
        C 0 776.4 0 679.6 0 512
        C 0 344.4 0 247.6 35.6 175.2
        C 71.2 102.8 102.8 71.2 175.2 35.6
        C 247.6 0 344.4 0 512 0 Z
      "/>
    </clipPath>

    <radialGradient id="bg" cx="60%" cy="38%" r="72%">
      <stop offset="0%"   stop-color="#12172a"/>
      <stop offset="100%" stop-color="#060709"/>
    </radialGradient>

    <linearGradient id="sg" gradientUnits="userSpaceOnUse" x1="80" y1="900" x2="960" y2="100">
      <stop offset="0%"   stop-color="#0a1a3d"/>
      <stop offset="30%"  stop-color="#1040a0"/>
      <stop offset="65%"  stop-color="#3b82f6"/>
      <stop offset="88%"  stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>

    <linearGradient id="gap" gradientUnits="userSpaceOnUse" x1="80" y1="900" x2="960" y2="100">
      <stop offset="0%"   stop-color="#030507"/>
      <stop offset="100%" stop-color="#080c16"/>
    </linearGradient>

    <mask id="m1">
      <path d="M -80,500 C 180,380 580,265 1100,170"
            fill="none" stroke="white" stroke-width="64" stroke-linecap="round"/>
    </mask>
    <mask id="m2">
      <path d="M -80,690 C 180,570 580,455 1100,360"
            fill="none" stroke="white" stroke-width="80" stroke-linecap="round"/>
    </mask>
    <mask id="m3">
      <path d="M -80,880 C 180,760 580,645 1100,550"
            fill="none" stroke="white" stroke-width="96" stroke-linecap="round"/>
    </mask>

    <mask id="gap12">
      <path d="M -80,564 C 180,444 580,329 1100,234"
            fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
    </mask>
    <mask id="gap23">
      <path d="M -80,770 C 180,650 580,535 1100,440"
            fill="none" stroke="white" stroke-width="10" stroke-linecap="round"/>
    </mask>

    <filter id="halo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>

    <radialGradient id="flare" cx="82%" cy="10%" r="38%">
      <stop offset="0%"   stop-color="#dbeafe" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#sq)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <rect width="1024" height="1024" fill="url(#sg)" mask="url(#m3)" opacity="0.30" filter="url(#halo)"/>
    <rect width="1024" height="1024" fill="url(#sg)" mask="url(#m2)" opacity="0.25" filter="url(#halo)"/>
    <rect width="1024" height="1024" fill="url(#sg)" mask="url(#m1)" opacity="0.20" filter="url(#halo)"/>

    <rect width="1024" height="1024" fill="url(#sg)" mask="url(#m3)" opacity="0.65"/>
    <rect width="1024" height="1024" fill="url(#sg)" mask="url(#m2)" opacity="0.82"/>
    <rect width="1024" height="1024" fill="url(#sg)" mask="url(#m1)" opacity="1.0"/>

    <rect width="1024" height="1024" fill="url(#gap)" mask="url(#gap12)" opacity="0.9"/>
    <rect width="1024" height="1024" fill="url(#gap)" mask="url(#gap23)" opacity="0.9"/>

    <path d="M 20,470 C 270,354 620,242 1080,148"
          fill="none" stroke="white" stroke-width="2"
          stroke-linecap="round" opacity="0.28"/>

    <rect width="1024" height="1024" fill="url(#flare)"/>
  </g>
</svg>
