<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Squircle Comparison</title>
  <style>
    body { background: #111; font-family: -apple-system, sans-serif; color: #ccc; padding: 40px; display: flex; gap: 60px; align-items: flex-start; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    span { font-size: 12px; color: #666; letter-spacing: 0.06em; text-transform: uppercase; }
  </style>
</head>
<body>

  <div class="cell">
    <span>Original squircle (icon.svg)</span>
    <!-- Original: control points at 210/814 — gentler, longer straight sides -->
    <svg width="256" height="256" viewBox="0 0 1024 1024">
      <path d="M512,0 C814,0 1024,0 1024,210 C1024,210 1024,512 1024,512 C1024,814 1024,1024 814,1024 C814,1024 512,1024 512,1024 C210,1024 0,1024 0,814 C0,814 0,512 0,512 C0,210 0,0 210,0 C210,0 512,0 512,0Z"
            fill="#3b82f6"/>
    </svg>
  </div>

  <div class="cell">
    <span>New squircle (concept-d-mac)</span>
    <!-- New: tighter corners at 64/960 — more Apple-like but slightly off -->
    <svg width="256" height="256" viewBox="0 0 1024 1024">
      <path d="M 512 0 C 759 0 896 0 960 64 C 1024 128 1024 265 1024 512 C 1024 759 1024 896 960 960 C 896 1024 759 1024 512 1024 C 265 1024 128 1024 64 960 C 0 896 0 759 0 512 C 0 265 0 128 64 64 C 128 0 265 0 512 0 Z"
            fill="#3b82f6"/>
    </svg>
  </div>

  <div class="cell">
    <span>Apple exact (superellipse n≈5)</span>
    <!-- Most accurate macOS icon squircle bezier approximation -->
    <svg width="256" height="256" viewBox="0 0 1024 1024">
      <path d="
        M 512 0
        C 679.6 0 776.4 0 848.8 35.6
        C 921.2 71.2 952.8 102.8 988.4 175.2
        C 1024 247.6 1024 344.4 1024 512
        C 1024 679.6 1024 776.4 988.4 848.8
        C 952.8 921.2 921.2 952.8 848.8 988.4
        C 776.4 1024 679.6 1024 512 1024
        C 344.4 1024 247.6 1024 175.2 988.4
        C 102.8 952.8 71.2 921.2 35.6 848.8
        C 0 776.4 0 679.6 0 512
        C 0 344.4 0 247.6 35.6 175.2
        C 71.2 102.8 102.8 71.2 175.2 35.6
        C 247.6 0 344.4 0 512 0 Z
      " fill="#3b82f6"/>
    </svg>
  </div>

  <div class="cell">
    <span>macOS Finder icon (reference)</span>
    <img src="logo-concept-d-mac.svg" width="256" height="256"/>
  </div>

</body>
</html>
