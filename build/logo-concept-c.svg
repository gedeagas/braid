<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    CONCEPT C — "Parallel Pillars"
    Three vertical pill-shaped columns of different heights, rising from a shared base.
    Left and right are equal. Center is tallest.
    Communicates: parallel sessions running simultaneously from one source.
    No branches, no nodes, no tree. Minimal and iconic.
  -->
  <defs>
    <clipPath id="sq-c">
      <path d="M512,0 C814,0 1024,0 1024,210 1024,210 1024,512 1024,512 1024,814 1024,1024 814,1024 814,1024 512,1024 512,1024 210,1024 0,1024 0,814 0,814 0,512 0,512 0,210 0,0 210,0 210,0 512,0 512,0Z"/>
    </clipPath>

    <!-- Deep dark background -->
    <radialGradient id="bg-c" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#0e1825"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>

    <!-- Pillar gradient: dark base → electric blue → bright tip -->
    <linearGradient id="pillarGrad-c" x1="0" y1="1" x2="0" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1f3c"/>
      <stop offset="35%"  stop-color="#1d52c4"/>
      <stop offset="75%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>

    <!-- Base connector gradient (horizontal) -->
    <linearGradient id="baseGrad-c" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0d1f3c"/>
      <stop offset="50%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>

    <!-- Glow filter for pillar caps -->
    <filter id="capglow-c" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow-c" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="28" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="baseglow-c" x="-20%" y="-80%" width="140%" height="260%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Cap glow gradient (spot of light at top of each pillar) -->
    <radialGradient id="capHalo-c" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#bfdbfe" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#sq-c)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg-c)"/>

    <!-- Ambient floor glow under base -->
    <ellipse cx="512" cy="760" rx="320" ry="30" fill="#1d4ed8" opacity="0.18" filter="url(#softglow-c)"/>

    <!-- Base connector bar -->
    <rect x="228" y="718" width="568" height="52" rx="26" fill="url(#baseGrad-c)" filter="url(#baseglow-c)"/>

    <!-- LEFT PILLAR (shorter) -->
    <rect x="248" y="358" width="112" height="360" rx="56" fill="url(#pillarGrad-c)"/>
    <!-- Left cap glow -->
    <ellipse cx="304" cy="358" rx="72" ry="48" fill="url(#capHalo-c)" filter="url(#capglow-c)"/>

    <!-- CENTER PILLAR (tallest) -->
    <rect x="456" y="222" width="112" height="496" rx="56" fill="url(#pillarGrad-c)"/>
    <!-- Center cap glow (brighter, taller pillar) -->
    <ellipse cx="512" cy="222" rx="80" ry="52" fill="url(#capHalo-c)" filter="url(#capglow-c)"/>

    <!-- RIGHT PILLAR (shorter, mirrors left) -->
    <rect x="664" y="358" width="112" height="360" rx="56" fill="url(#pillarGrad-c)"/>
    <!-- Right cap glow -->
    <ellipse cx="720" cy="358" rx="72" ry="48" fill="url(#capHalo-c)" filter="url(#capglow-c)"/>

    <!-- Subtle top highlight on each pillar (specular shine) -->
    <ellipse cx="304"  cy="368" rx="28" ry="16" fill="white" opacity="0.12"/>
    <ellipse cx="512"  cy="232" rx="28" ry="16" fill="white" opacity="0.16"/>
    <ellipse cx="720"  cy="368" rx="28" ry="16" fill="white" opacity="0.12"/>
  </g>
</svg>
