<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    CONCEPT D — "Triple Sweep"
    Three bold diagonal parallel arcs sweeping from lower-left to upper-right,
    each offset and slightly curved. Like racing lines or a velocity mark.
    Communicates: speed, parallelism, forward motion, multiple agents in motion.
    Completely abstract — no nodes, no tree, no hierarchy diagram.
  -->
  <defs>
    <clipPath id="sq-d">
      <path d="M512,0 C814,0 1024,0 1024,210 1024,210 1024,512 1024,512 1024,814 1024,1024 814,1024 814,1024 512,1024 512,1024 210,1024 0,1024 0,814 0,814 0,512 0,512 0,210 0,0 210,0 210,0 512,0 512,0Z"/>
    </clipPath>

    <!-- Background: near-black with subtle warm-dark center -->
    <radialGradient id="bg-d" cx="62%" cy="38%" r="70%">
      <stop offset="0%"   stop-color="#111520"/>
      <stop offset="100%" stop-color="#060709"/>
    </radialGradient>

    <!-- Sweep gradient: dim at tail → blazing at head (upper-right direction) -->
    <linearGradient id="sweepGrad-d" gradientUnits="userSpaceOnUse"
                    x1="100" y1="850" x2="940" y2="120">
      <stop offset="0%"   stop-color="#0f2044" stop-opacity="0.6"/>
      <stop offset="45%"  stop-color="#2563eb" stop-opacity="0.9"/>
      <stop offset="80%"  stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>

    <!--
      Three sweep paths — broad curved arcs, each offset by ~180px downward.
      They share the same angle and curvature, creating a "racing lines" feel.
      Sweep 1 = top (enters frame mid-left, exits upper-right)
      Sweep 2 = middle
      Sweep 3 = bottom (enters lower-left, exits mid-right)
    -->
    <mask id="sw1">
      <!-- Top sweep: thin, elegant -->
      <path d="M -40,460  C 220,340 620,200 1000,100"
            fill="none" stroke="white" stroke-width="58" stroke-linecap="round"/>
    </mask>
    <mask id="sw2">
      <!-- Middle sweep: slightly thicker -->
      <path d="M -40,640  C 220,520 620,380 1000,280"
            fill="none" stroke="white" stroke-width="72" stroke-linecap="round"/>
    </mask>
    <mask id="sw3">
      <!-- Bottom sweep: thickest (closest / most prominent) -->
      <path d="M -40,820  C 220,700 620,560 1000,460"
            fill="none" stroke="white" stroke-width="86" stroke-linecap="round"/>
    </mask>

    <!-- Glow halos per sweep (fatter blur rects) -->
    <mask id="sw1g">
      <path d="M -40,460  C 220,340 620,200 1000,100"
            fill="none" stroke="white" stroke-width="90" stroke-linecap="round"/>
    </mask>
    <mask id="sw2g">
      <path d="M -40,640  C 220,520 620,380 1000,280"
            fill="none" stroke="white" stroke-width="110" stroke-linecap="round"/>
    </mask>
    <mask id="sw3g">
      <path d="M -40,820  C 220,700 620,560 1000,460"
            fill="none" stroke="white" stroke-width="130" stroke-linecap="round"/>
    </mask>

    <!-- Soft glow filter -->
    <filter id="glow-d" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="halo-d" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <!-- Brighter tip gradient (applied over the swept areas in upper-right zone) -->
    <radialGradient id="tipFlare-d" cx="88%" cy="12%" r="35%">
      <stop offset="0%"   stop-color="#bfdbfe" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g clip-path="url(#sq-d)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg-d)"/>

    <!-- Glow halos first (behind the solid strokes) -->
    <rect width="1024" height="1024" fill="url(#sweepGrad-d)" mask="url(#sw3g)" opacity="0.35" filter="url(#halo-d)"/>
    <rect width="1024" height="1024" fill="url(#sweepGrad-d)" mask="url(#sw2g)" opacity="0.3"  filter="url(#halo-d)"/>
    <rect width="1024" height="1024" fill="url(#sweepGrad-d)" mask="url(#sw1g)" opacity="0.25" filter="url(#halo-d)"/>

    <!-- Solid sweeps (bottom sweep first = visually behind) -->
    <rect width="1024" height="1024" fill="url(#sweepGrad-d)" mask="url(#sw3)" opacity="0.72"/>
    <rect width="1024" height="1024" fill="url(#sweepGrad-d)" mask="url(#sw2)" opacity="0.86"/>
    <rect width="1024" height="1024" fill="url(#sweepGrad-d)" mask="url(#sw1)" opacity="1.0"/>

    <!-- Bright flare at the "head" of the sweeps (upper-right) -->
    <rect width="1024" height="1024" fill="url(#tipFlare-d)"/>

    <!-- Subtle specular edge highlight on top sweep (leading edge catch-light) -->
    <path d="M 80,430  C 330,315 680,178 1010,72"
          fill="none" stroke="white" stroke-width="2.5"
          stroke-linecap="round" opacity="0.22"/>
    <path d="M 80,658  C 330,538 680,400 1010,296"
          fill="none" stroke="white" stroke-width="2"
          stroke-linecap="round" opacity="0.15"/>
  </g>
</svg>
